name: Build & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'JuiceVault v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.keystore -alias juicevault -keyalg RSA -keysize 2048 -validity 10000 -storepass juicevault -keypass juicevault -dname "CN=JuiceVault,O=JuiceVault,C=US"
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
            ${BUILD_TOOLS}zipalign -v 4 "$APK" aligned.apk
            ${BUILD_TOOLS}apksigner sign --ks release.keystore --ks-pass pass:juicevault --key-pass pass:juicevault --out JuiceVault-android.apk aligned.apk
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-android
          path: JuiceVault-android.apk
          if-no-files-found: ignore

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Enable iOS background audio
        run: |
          PLIST="src-tauri/gen/apple/juicevault-desktop_iOS/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true

      - name: Add background audio Swift code
        shell: bash
        run: |
          SOURCES_DIR="src-tauri/gen/apple/Sources/juicevault-desktop"
          cat > "${SOURCES_DIR}/BackgroundAudio.swift" <<'BGAUDIO'
          import AVFoundation
          import UIKit

          class BackgroundAudioManager {
              static let shared = BackgroundAudioManager()
              private var silentPlayer: AVAudioPlayer?

              func configure() {
                  do {
                      let session = AVAudioSession.sharedInstance()
                      try session.setCategory(.playback, mode: .default, options: [.mixWithOthers])
                      try session.setActive(true)
                  } catch {
                      print("[BG Audio] Failed to configure: \(error)")
                  }
                  prepareSilentPlayer()
                  silentPlayer?.play()
                  NotificationCenter.default.addObserver(self, selector: #selector(appDidEnterBackground), name: UIApplication.didEnterBackgroundNotification, object: nil)
                  NotificationCenter.default.addObserver(self, selector: #selector(appWillEnterForeground), name: UIApplication.willEnterForegroundNotification, object: nil)
                  NotificationCenter.default.addObserver(self, selector: #selector(handleInterruption), name: AVAudioSession.interruptionNotification, object: nil)
              }

              private func prepareSilentPlayer() {
                  let sampleRate = 44100.0
                  let channels: UInt32 = 1
                  let frames: UInt32 = UInt32(sampleRate)
                  let bytesPerFrame: UInt32 = 2
                  let dataSize = frames * bytesPerFrame
                  var header = Data()
                  func append(_ s: String) { header.append(contentsOf: Array(s.utf8)) }
                  func appendUInt32(_ v: UInt32) { var val = v.littleEndian; header.append(Data(bytes: &val, count: 4)) }
                  func appendUInt16(_ v: UInt16) { var val = v.littleEndian; header.append(Data(bytes: &val, count: 2)) }
                  append("RIFF")
                  appendUInt32(36 + dataSize)
                  append("WAVEfmt ")
                  appendUInt32(16)
                  appendUInt16(1)
                  appendUInt16(UInt16(channels))
                  appendUInt32(UInt32(sampleRate))
                  appendUInt32(UInt32(sampleRate) * bytesPerFrame * channels)
                  appendUInt16(UInt16(bytesPerFrame * channels))
                  appendUInt16(16)
                  append("data")
                  appendUInt32(dataSize)
                  header.append(Data(count: Int(dataSize)))
                  do {
                      silentPlayer = try AVAudioPlayer(data: header)
                      silentPlayer?.numberOfLoops = -1
                      silentPlayer?.volume = 0.0
                      silentPlayer?.prepareToPlay()
                  } catch {
                      print("[BG Audio] Silent player error: \(error)")
                  }
              }

              @objc private func appDidEnterBackground() {
                  try? AVAudioSession.sharedInstance().setActive(true)
                  if silentPlayer?.isPlaying != true {
                      silentPlayer?.play()
                  }
              }

              @objc private func appWillEnterForeground() {
              }

              @objc private func handleInterruption(notification: Notification) {
                  guard let info = notification.userInfo,
                        let typeValue = info[AVAudioSessionInterruptionTypeKey] as? UInt,
                        let type = AVAudioSession.InterruptionType(rawValue: typeValue) else { return }
                  if type == .ended {
                      try? AVAudioSession.sharedInstance().setActive(true)
                      if UIApplication.shared.applicationState == .background {
                          silentPlayer?.play()
                      }
                  }
              }
          }
          BGAUDIO
          sed -i '' 's/^          //' "${SOURCES_DIR}/BackgroundAudio.swift"

          APPDELEGATE=$(find src-tauri/gen/apple -name "*.swift" -path "*/Sources/*" | xargs grep -l "didFinishLaunchingWithOptions" 2>/dev/null | head -1)
          if [ -n "$APPDELEGATE" ] && [ -f "$APPDELEGATE" ]; then
            if ! grep -q "BackgroundAudioManager" "$APPDELEGATE"; then
              sed -i '' '/didFinishLaunchingWithOptions.*->.*Bool.*{/a\'$'\n''        BackgroundAudioManager.shared.configure()' "$APPDELEGATE"
            fi
          fi

      - name: Disable iOS code signing
        run: |
          PBXPROJ="src-tauri/gen/apple/juicevault-desktop.xcodeproj/project.pbxproj"
          perl -i -pe 's/CODE_SIGN_IDENTITY = ".*?"/CODE_SIGN_IDENTITY = "-"/g' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_REQUIRED/' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_ALLOWED/' "$PBXPROJ"
          perl -i -pe 's/(CODE_SIGN_IDENTITY = "-";)/$1\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"

      - name: Build iOS (unsigned)
        run: npx tauri ios build || echo "Export failed (expected without signing), using .app from DerivedData"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*release-iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r JuiceVault-unsigned.ipa Payload
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-ios
          path: JuiceVault-unsigned.ipa
          if-no-files-found: ignore

  zip-and-upload:
    needs: [build, build-android, build-ios]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: juicevault-*
          path: all-platforms
          merge-multiple: true

      - name: Zip the artifacts
        run: |
          cd all-platforms
          zip -r ../JuiceVault-All-Platforms.zip .
          cd ..

      - name: Get Version from Tauri Config
        id: get_version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ env.VERSION }}" JuiceVault-All-Platforms.zip --clobber