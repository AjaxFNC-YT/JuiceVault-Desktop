name: Build & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'JuiceVault v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.keystore -alias juicevault -keyalg RSA -keysize 2048 -validity 10000 -storepass juicevault -keypass juicevault -dname "CN=JuiceVault,O=JuiceVault,C=US"
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
            ${BUILD_TOOLS}zipalign -v 4 "$APK" aligned.apk
            ${BUILD_TOOLS}apksigner sign --ks release.keystore --ks-pass pass:juicevault --key-pass pass:juicevault --out JuiceVault-android.apk aligned.apk
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-android
          path: JuiceVault-android.apk
          if-no-files-found: ignore

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Debug iOS project structure
        run: |
          echo "=== Apple gen directory ==="
          find src-tauri/gen/apple -type f -name "*.swift" 2>/dev/null || echo "No swift files found"
          echo "=== Sources directories ==="
          find src-tauri/gen/apple -type d -name "Sources" 2>/dev/null || echo "No Sources dir"
          find src-tauri/gen/apple -type d 2>/dev/null | head -30
          echo "=== Info.plist locations ==="
          find src-tauri/gen/apple -name "Info.plist" 2>/dev/null || echo "No Info.plist"

      - name: Enable iOS background audio
        run: |
          PLIST=$(find src-tauri/gen/apple -name "Info.plist" -path "*_iOS*" 2>/dev/null | head -1)
          if [ -z "$PLIST" ]; then
            PLIST=$(find src-tauri/gen/apple -name "Info.plist" 2>/dev/null | head -1)
          fi
          echo "Using Info.plist: $PLIST"
          if [ -n "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true
            echo "=== Info.plist UIBackgroundModes ==="
            /usr/libexec/PlistBuddy -c "Print :UIBackgroundModes" "$PLIST" 2>/dev/null || echo "Could not read UIBackgroundModes"
          else
            echo "ERROR: No Info.plist found"
            exit 1
          fi

      - name: Add background audio Swift code
        run: |
          SOURCES_DIR=$(find src-tauri/gen/apple -type d -name "Sources" 2>/dev/null | head -1)
          if [ -z "$SOURCES_DIR" ]; then
            echo "ERROR: Could not find Sources directory"
            find src-tauri/gen/apple -type d 2>/dev/null | head -20
            exit 1
          fi
          SWIFT_DIR=$(find "$SOURCES_DIR" -type d -mindepth 1 -maxdepth 1 2>/dev/null | head -1)
          if [ -z "$SWIFT_DIR" ]; then
            SWIFT_DIR="$SOURCES_DIR"
          fi
          echo "Writing BackgroundAudio.swift to: $SWIFT_DIR"
          {
            echo 'import AVFoundation'
            echo 'import UIKit'
            echo ''
            echo 'class BackgroundAudioManager {'
            echo '    static let shared = BackgroundAudioManager()'
            echo '    private var silentPlayer: AVAudioPlayer?'
            echo ''
            echo '    func configure() {'
            echo '        do {'
            echo '            let session = AVAudioSession.sharedInstance()'
            echo '            try session.setCategory(.playback, mode: .default, options: [.mixWithOthers])'
            echo '            try session.setActive(true)'
            echo '        } catch {'
            echo '            print("[BG Audio] Failed to configure: \\(error)")'
            echo '        }'
            echo '        prepareSilentPlayer()'
            echo '        silentPlayer?.play()'
            echo '        NotificationCenter.default.addObserver(self, selector: #selector(appDidEnterBackground), name: UIApplication.didEnterBackgroundNotification, object: nil)'
            echo '        NotificationCenter.default.addObserver(self, selector: #selector(appWillEnterForeground), name: UIApplication.willEnterForegroundNotification, object: nil)'
            echo '        NotificationCenter.default.addObserver(self, selector: #selector(handleInterruption), name: AVAudioSession.interruptionNotification, object: nil)'
            echo '    }'
            echo ''
            echo '    private func prepareSilentPlayer() {'
            echo '        let sampleRate = 44100.0'
            echo '        let channels: UInt32 = 1'
            echo '        let frames: UInt32 = UInt32(sampleRate)'
            echo '        let bytesPerFrame: UInt32 = 2'
            echo '        let dataSize = frames * bytesPerFrame'
            echo '        var header = Data()'
            echo '        func append(_ s: String) { header.append(contentsOf: Array(s.utf8)) }'
            echo '        func appendUInt32(_ v: UInt32) { var val = v.littleEndian; header.append(Data(bytes: &val, count: 4)) }'
            echo '        func appendUInt16(_ v: UInt16) { var val = v.littleEndian; header.append(Data(bytes: &val, count: 2)) }'
            echo '        append("RIFF")'
            echo '        appendUInt32(36 + dataSize)'
            echo '        append("WAVEfmt ")'
            echo '        appendUInt32(16)'
            echo '        appendUInt16(1)'
            echo '        appendUInt16(UInt16(channels))'
            echo '        appendUInt32(UInt32(sampleRate))'
            echo '        appendUInt32(UInt32(sampleRate) * bytesPerFrame * channels)'
            echo '        appendUInt16(UInt16(bytesPerFrame * channels))'
            echo '        appendUInt16(16)'
            echo '        append("data")'
            echo '        appendUInt32(dataSize)'
            echo '        header.append(Data(count: Int(dataSize)))'
            echo '        do {'
            echo '            silentPlayer = try AVAudioPlayer(data: header)'
            echo '            silentPlayer?.numberOfLoops = -1'
            echo '            silentPlayer?.volume = 0.0'
            echo '            silentPlayer?.prepareToPlay()'
            echo '        } catch {'
            echo '            print("[BG Audio] Silent player error: \\(error)")'
            echo '        }'
            echo '    }'
            echo ''
            echo '    @objc private func appDidEnterBackground() {'
            echo '        try? AVAudioSession.sharedInstance().setActive(true)'
            echo '        if silentPlayer?.isPlaying != true {'
            echo '            silentPlayer?.play()'
            echo '        }'
            echo '    }'
            echo ''
            echo '    @objc private func appWillEnterForeground() {'
            echo '    }'
            echo ''
            echo '    @objc private func handleInterruption(notification: Notification) {'
            echo '        guard let info = notification.userInfo,'
            echo '              let typeValue = info[AVAudioSessionInterruptionTypeKey] as? UInt,'
            echo '              let type = AVAudioSession.InterruptionType(rawValue: typeValue) else { return }'
            echo '        if type == .ended {'
            echo '            try? AVAudioSession.sharedInstance().setActive(true)'
            echo '            if UIApplication.shared.applicationState == .background {'
            echo '                silentPlayer?.play()'
            echo '            }'
            echo '        }'
            echo '    }'
            echo '}'
          } > "$SWIFT_DIR/BackgroundAudio.swift"
          echo "=== Written BackgroundAudio.swift ==="
          cat "$SWIFT_DIR/BackgroundAudio.swift"

          APPDELEGATE=$(find src-tauri/gen/apple -name "*.swift" -path "*/Sources/*" | xargs grep -l "didFinishLaunchingWithOptions" 2>/dev/null | head -1)
          if [ -n "$APPDELEGATE" ] && [ -f "$APPDELEGATE" ]; then
            echo "Found AppDelegate: $APPDELEGATE"
            if ! grep -q "BackgroundAudioManager" "$APPDELEGATE"; then
              sed -i '' '/didFinishLaunchingWithOptions.*->.*Bool.*{/a\'$'\n''        BackgroundAudioManager.shared.configure()' "$APPDELEGATE"
            fi
            echo "=== AppDelegate after patch ==="
            cat "$APPDELEGATE"
          else
            echo "WARNING: Could not find AppDelegate with didFinishLaunchingWithOptions"
            find src-tauri/gen/apple -name "*.swift" -path "*/Sources/*" 2>/dev/null
          fi

      - name: Disable iOS code signing
        run: |
          PBXPROJ="src-tauri/gen/apple/juicevault-desktop.xcodeproj/project.pbxproj"
          perl -i -pe 's/CODE_SIGN_IDENTITY = ".*?"/CODE_SIGN_IDENTITY = "-"/g' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_REQUIRED/' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_ALLOWED/' "$PBXPROJ"
          perl -i -pe 's/(CODE_SIGN_IDENTITY = "-";)/$1\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"

      - name: Build iOS (unsigned)
        run: npx tauri ios build || echo "Export failed (expected without signing), using .app from DerivedData"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*release-iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r JuiceVault-unsigned.ipa Payload
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-ios
          path: JuiceVault-unsigned.ipa
          if-no-files-found: ignore

  zip-and-upload:
    needs: [build, build-android, build-ios]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: juicevault-*
          path: all-platforms
          merge-multiple: true

      - name: Zip the artifacts
        run: |
          cd all-platforms
          zip -r ../JuiceVault-All-Platforms.zip .
          cd ..

      - name: Get Version from Tauri Config
        id: get_version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ env.VERSION }}" JuiceVault-All-Platforms.zip --clobber