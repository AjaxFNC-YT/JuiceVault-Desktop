name: Build & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'JuiceVault v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri iOS project
        run: npx tauri ios init

      - name: Disable code signing in generated project
        run: |
          PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
          echo "Patching: $PBXPROJ"
          # Switch from Automatic to Manual signing and disable all code signing
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = "[^"]*"/DEVELOPMENT_TEAM = ""/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*"/CODE_SIGN_IDENTITY = ""/g' "$PBXPROJ"
          # Inject CODE_SIGNING_REQUIRED=NO and CODE_SIGNING_ALLOWED=NO after each CODE_SIGN_STYLE line
          perl -i -pe 's/(CODE_SIGN_STYLE = Manual;)/$1\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"

      - name: Enable background audio
        run: |
          PLIST=$(find src-tauri/gen/apple -name "Info.plist" -path "*_iOS*" 2>/dev/null | head -1)
          [ -z "$PLIST" ] && PLIST=$(find src-tauri/gen/apple -name "Info.plist" 2>/dev/null | head -1)
          if [ -z "$PLIST" ]; then
            echo "ERROR: No Info.plist found"
            exit 1
          fi
          echo "Using Info.plist: $PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true

      - name: Build unsigned iOS app
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/JuiceVault.xcarchive"

          # tauri ios build handles: frontend build, Rust cross-compilation,
          # server addr file, and xcodebuild.
          # The export step may fail without signing - we only need the .app.
          npx tauri ios build -- \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
          || true

          # The .app lives inside the archive
          APP_PATH="$ARCHIVE_PATH/Products/Applications/JuiceVault.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Archive .app not found at expected path, searching..."
            APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            find "$ARCHIVE_PATH" -type d 2>/dev/null | head -30 || echo "Archive directory does not exist"
            exit 1
          fi

          echo "Packaging: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload JuiceVault-unsigned.ipa
          ls -lh JuiceVault-unsigned.ipa

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-ios
          path: JuiceVault-unsigned.ipa
          if-no-files-found: error

  zip-and-upload:
    needs: [build, build-ios]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: juicevault-*
          path: all-platforms
          merge-multiple: true

      - name: Zip the artifacts
        run: |
          cd all-platforms
          zip -r ../JuiceVault-All-Platforms.zip .
          cd ..

      - name: Get Version from Tauri Config
        id: get_version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ env.VERSION }}" JuiceVault-All-Platforms.zip --clobber
