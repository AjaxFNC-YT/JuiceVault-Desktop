name: Build & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'JuiceVault v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.keystore -alias juicevault -keyalg RSA -keysize 2048 -validity 10000 -storepass juicevault -keypass juicevault -dname "CN=JuiceVault,O=JuiceVault,C=US"
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
            ${BUILD_TOOLS}zipalign -v 4 "$APK" aligned.apk
            ${BUILD_TOOLS}apksigner sign --ks release.keystore --ks-pass pass:juicevault --key-pass pass:juicevault --out JuiceVault-android.apk aligned.apk
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-android
          path: JuiceVault-android.apk
          if-no-files-found: ignore

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Build iOS (unsigned via xcodebuild)
        run: |
          xcodebuild \
            -scheme juicevault-desktop_iOS \
            -workspace src-tauri/gen/apple/juicevault-desktop.xcodeproj/project.xcworkspace \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath src-tauri/gen/apple/build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find src-tauri/gen/apple/build -name "*.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r JuiceVault-unsigned.ipa Payload
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-ios
          path: JuiceVault-unsigned.ipa
          if-no-files-found: ignore

  zip-and-upload:
    needs: [build, build-android, build-ios]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: juicevault-*
          path: all-platforms
          merge-multiple: true

      - name: Zip the artifacts
        run: |
          cd all-platforms
          zip -r ../JuiceVault-All-Platforms.zip .
          cd ..

      - name: Get Version from Tauri Config
        id: get_version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ env.VERSION }}" JuiceVault-All-Platforms.zip --clobber