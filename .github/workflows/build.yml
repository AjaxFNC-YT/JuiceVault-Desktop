name: Build & Release

on:
  push:
    branches:
      - '**' # This makes it run automatically whenever you push to any branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'JuiceVault v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore

  # --- NEW JOB TO ZIP AND UPLOAD ---
  zip-and-upload:
    needs: build # Tells this job to wait until all 'build' matrix jobs finish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: juicevault-*
          path: all-platforms
          merge-multiple: true # This throws all the .exe, .dmg, .deb, etc. into one folder

      - name: Zip the artifacts
        run: |
          cd all-platforms
          zip -r ../JuiceVault-All-Platforms.zip .
          cd ..

      - name: Get Version from Tauri Config
        id: get_version
        run: |
          # Extracts the version from your tauri.conf.json so we know which GitHub release to target
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Uploads the zip directly to the draft release made by the tauri action
          gh release upload "v${{ env.VERSION }}" JuiceVault-All-Platforms.zip --clobber
