name: Build & Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'JuiceVault v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: ignore
  build-ios:
    runs-on: macos-latest
    env:
      IOS_WORKDIR: ${{ runner.temp }}/juicevault-ios-src
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare isolated iOS workspace
        run: |
          rm -rf "$IOS_WORKDIR"
          mkdir -p "$IOS_WORKDIR"
          rsync -a --delete --exclude ".git" "$GITHUB_WORKSPACE/" "$IOS_WORKDIR/"

      - name: Read iOS app metadata
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          APP_NAME=$(node -p "require('./src-tauri/tauri.conf.json').productName")
          APP_ID=$(node -p "require('./src-tauri/tauri.conf.json').identifier")
          echo "APP_NAME=$APP_NAME" >> "$GITHUB_ENV"
          echo "APP_ID=$APP_ID" >> "$GITHUB_ENV"
          echo "IOS_DERIVED_DATA=$RUNNER_TEMP/juicevault-ios-derived-data" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: ${{ env.IOS_WORKDIR }}
        run: npm ci

      - name: Initialize Tauri iOS
        working-directory: ${{ env.IOS_WORKDIR }}
        run: npx tauri ios init

      - name: Locate generated iOS project
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          WORKSPACE=$(find src-tauri/gen/apple -maxdepth 2 -name "*.xcworkspace" -type d | head -1)
          PROJECT=$(find src-tauri/gen/apple -maxdepth 2 -name "*.xcodeproj" -type d | head -1)
          if [ -z "$WORKSPACE" ] && [ -z "$PROJECT" ]; then
            echo "No generated Xcode workspace or project found"
            exit 1
          fi

          if [ -n "$WORKSPACE" ]; then
            echo "IOS_WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"
            LIST_OUTPUT=$(xcodebuild -list -workspace "$WORKSPACE" 2>&1)
          else
            echo "IOS_PROJECT=$PROJECT" >> "$GITHUB_ENV"
            LIST_OUTPUT=$(xcodebuild -list -project "$PROJECT" 2>&1)
          fi

          printf '%s\n' "$LIST_OUTPUT"
          SCHEME=$(printf '%s\n' "$LIST_OUTPUT" | sed -n '/Schemes:/,$p' | tail -n +2 | sed 's/^[[:space:]]*//' | sed '/^$/d' | head -1)

          if [ -z "$SCHEME" ]; then
            PROJECT_BASENAME=$(basename "${PROJECT:-$WORKSPACE}")
            PROJECT_BASENAME=${PROJECT_BASENAME%.xcodeproj}
            PROJECT_BASENAME=${PROJECT_BASENAME%.xcworkspace}
            SCHEME="${PROJECT_BASENAME}_iOS"
            echo "Falling back to scheme: $SCHEME"
          fi

          if [ -z "$SCHEME" ]; then
            echo "Unable to determine Xcode scheme"
            exit 1
          fi

          echo "IOS_SCHEME=$SCHEME" >> "$GITHUB_ENV"

      - name: Debug iOS project structure
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          echo "=== Apple gen directory ==="
          find src-tauri/gen/apple -type f -name "*.swift" 2>/dev/null || echo "No swift files found"
          echo "=== Sources directories ==="
          find src-tauri/gen/apple -type d -name "Sources" 2>/dev/null || echo "No Sources dir"
          find src-tauri/gen/apple -type d 2>/dev/null | head -30
          echo "=== Info.plist locations ==="
          find src-tauri/gen/apple -name "Info.plist" 2>/dev/null || echo "No Info.plist"
          echo "=== Xcode selection ==="
          echo "Workspace: ${IOS_WORKSPACE:-<none>}"
          echo "Project: ${IOS_PROJECT:-<none>}"
          echo "Scheme: ${IOS_SCHEME:-<none>}"

      - name: Enable iOS background audio
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          PLIST=$(find src-tauri/gen/apple -name "Info.plist" -path "*_iOS*" 2>/dev/null | head -1)
          if [ -z "$PLIST" ]; then
            PLIST=$(find src-tauri/gen/apple -name "Info.plist" 2>/dev/null | head -1)
          fi
          echo "Using Info.plist: $PLIST"
          if [ -n "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true
            echo "=== Info.plist UIBackgroundModes ==="
            /usr/libexec/PlistBuddy -c "Print :UIBackgroundModes" "$PLIST" 2>/dev/null || echo "Could not read UIBackgroundModes"
          else
            echo "ERROR: No Info.plist found"
            exit 1
          fi

      - name: Disable iOS code signing in generated project
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          PBXPROJ="${IOS_PROJECT:-${IOS_WORKSPACE%/project.xcworkspace}}/project.pbxproj"
          echo "Using project file: $PBXPROJ"
          perl -i -pe 's/CODE_SIGN_IDENTITY = ".*?"/CODE_SIGN_IDENTITY = ""/g' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_REQUIRED = /' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_ALLOWED = /' "$PBXPROJ"
          perl -i -pe 's/(CODE_SIGN_STYLE = Automatic;)/$1\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"
          perl -i -pe 's/(PRODUCT_BUNDLE_IDENTIFIER = [^;]+;)/$1\n\t\t\t\tDEVELOPMENT_TEAM = "";/g unless /DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"

      - name: Build iOS via Tauri CLI
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          rm -rf "$IOS_DERIVED_DATA"
          npx tauri ios build --ci || echo "Tauri export failed; attempting to package built artifacts manually"

      - name: Locate built iOS app
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          mapfile -t IPA_CANDIDATES < <(find src-tauri "$HOME/Library/Developer/Xcode/DerivedData" "$RUNNER_TEMP" \
            -name "*.ipa" -type f 2>/dev/null | sort -u)

          BEST_IPA_PATH=""
          BEST_IPA_SIZE=0
          for IPA_PATH in "${IPA_CANDIDATES[@]}"; do
            SIZE=$(du -sk "$IPA_PATH" | cut -f1)
            echo "Found IPA candidate: $IPA_PATH (${SIZE} KB)"
            if [ "$SIZE" -gt "$BEST_IPA_SIZE" ]; then
              BEST_IPA_SIZE="$SIZE"
              BEST_IPA_PATH="$IPA_PATH"
            fi
          done

          if [ -n "$BEST_IPA_PATH" ] && [ "$BEST_IPA_SIZE" -gt 512 ]; then
            echo "Using generated IPA: $BEST_IPA_PATH"
            cp "$BEST_IPA_PATH" JuiceVault-unsigned.ipa
            ls -lh JuiceVault-unsigned.ipa
            exit 0
          fi

          mapfile -t APP_CANDIDATES < <(find src-tauri "$HOME/Library/Developer/Xcode/DerivedData" "$RUNNER_TEMP" \
            -name "$APP_NAME.app" -type d 2>/dev/null | sort -u)

          if [ "${#APP_CANDIDATES[@]}" -eq 0 ]; then
            echo "No $APP_NAME.app bundle found after tauri ios build"
            find src-tauri "$HOME/Library/Developer/Xcode/DerivedData" "$RUNNER_TEMP" -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

          BEST_APP_PATH=""
          BEST_APP_SIZE=0
          for APP_PATH in "${APP_CANDIDATES[@]}"; do
            SIZE=$(du -sk "$APP_PATH" | cut -f1)
            echo "Found app candidate: $APP_PATH (${SIZE} KB)"
            if [ "$SIZE" -gt "$BEST_APP_SIZE" ]; then
              BEST_APP_SIZE="$SIZE"
              BEST_APP_PATH="$APP_PATH"
            fi
          done

          if [ -z "$BEST_APP_PATH" ] || [ "$BEST_APP_SIZE" -le 512 ]; then
            echo "Built app bundle looks too small or missing"
            exit 1
          fi

          echo "IOS_APP_PATH=$BEST_APP_PATH" >> "$GITHUB_ENV"
          echo "Selected app bundle: $BEST_APP_PATH"
          du -sh "$BEST_APP_PATH"
          ls -la "$BEST_APP_PATH"
          if [ -f "$BEST_APP_PATH/Info.plist" ]; then
            /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$BEST_APP_PATH/Info.plist" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$BEST_APP_PATH/Info.plist" 2>/dev/null || true
          fi
          if [ -f "$BEST_APP_PATH/Assets.car" ]; then
            echo "Assets.car present"
          else
            echo "Assets.car missing"
          fi

      - name: Package unsigned IPA
        working-directory: ${{ env.IOS_WORKDIR }}
        run: |
          if [ -f JuiceVault-unsigned.ipa ]; then
            echo "IPA already prepared"
            ls -lh JuiceVault-unsigned.ipa
            exit 0
          fi

          if [ ! -d "$IOS_APP_PATH" ]; then
            echo "No built app found to package"
            exit 1
          fi

          rm -rf Payload JuiceVault-unsigned.ipa
          mkdir -p Payload
          cp -R "$IOS_APP_PATH" "Payload/$APP_NAME.app"
          ditto -c -k --sequesterRsrc --keepParent Payload JuiceVault-unsigned.ipa
          ls -lh JuiceVault-unsigned.ipa

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-ios
          path: ${{ env.IOS_WORKDIR }}/JuiceVault-unsigned.ipa
          if-no-files-found: ignore

  zip-and-upload:
    needs: [build, build-ios]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: juicevault-*
          path: all-platforms
          merge-multiple: true

      - name: Zip the artifacts
        run: |
          cd all-platforms
          zip -r ../JuiceVault-All-Platforms.zip .
          cd ..

      - name: Get Version from Tauri Config
        id: get_version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ env.VERSION }}" JuiceVault-All-Platforms.zip --clobber
