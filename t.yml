
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri iOS
        run: npx tauri ios init

      - name: Disable iOS code signing
        run: |
          PBXPROJ="src-tauri/gen/apple/juicevault-desktop.xcodeproj/project.pbxproj"
          perl -i -pe 's/CODE_SIGN_IDENTITY = ".*?"/CODE_SIGN_IDENTITY = "-"/g' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_REQUIRED/' "$PBXPROJ"
          perl -i -ne 'print unless /CODE_SIGNING_ALLOWED/' "$PBXPROJ"
          perl -i -pe 's/(CODE_SIGN_IDENTITY = "-";)/$1\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"

      - name: Build iOS (unsigned)
        run: npx tauri ios build || echo "Export failed (expected without signing), using .app from DerivedData"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*release-iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r JuiceVault-unsigned.ipa Payload
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: juicevault-ios
          path: JuiceVault-unsigned.ipa
          if-no-files-found: ignore